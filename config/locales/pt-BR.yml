        one: "1 dia"
        other: "%{count} dias"
      about_x_months:
        one: "cerca de 1 mês"
        other: "cerca de %{count} meses"
      x_months:
        one: "1 mês"
        other: "%{count} meses"
      about_x_years:
        one: "cerca de 1 ano"
        other: "cerca de %{count} anos"
      over_x_years:
        one: "mais de 1 ano"
        other: "mais de %{count} anos"
      almost_x_years:
        one: "quase 1 ano"
        other: "quase %{count} anos"
