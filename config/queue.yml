default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    - queues: "critical,imports,default,mailers"
      threads: 5
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: 0.1

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
  workers:
    - queues: "critical"
      threads: 3
      processes: 2
      polling_interval: 0.05
    - queues: "imports"
      threads: 3
      processes: 2
      polling_interval: 0.1
    - queues: "default,mailers"
      threads: 5
      processes: 1
      polling_interval: 0.1
